<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Školní portál</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        header {
            background: white;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        header h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 5px;
        }

        header p {
            color: #666;
            font-size: 12px;
        }

        .main-content {
            display: flex;
            gap: 10px;
            flex: 1;
            min-height: 0;
        }

        .chat-panel, .ai-panel {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-panel {
            flex: 1;
        }

        .ai-panel {
            flex: 1;
        }

        .panel-header {
            background: #667eea;
            color: white;
            padding: 15px;
            font-weight: bold;
            font-size: 14px;
        }

        .panel-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 15px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            border: 1px solid #eee;
            border-radius: 4px;
            padding: 10px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px;
            background: white;
            border-left: 3px solid #667eea;
            border-radius: 3px;
        }

        .message-user {
            font-weight: bold;
            color: #667eea;
            font-size: 12px;
        }

        .message-text {
            color: #333;
            margin-top: 4px;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
        }

        .ai-response {
            background: #f0f4ff;
            border-left-color: #764ba2;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="email"], textarea, select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
        }

        input[type="text"], select {
            height: 38px;
        }

        textarea {
            resize: vertical;
            padding: 10px;
            min-height: 60px;
            font-size: 13px;
        }

        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        button:active {
            transform: scale(0.98);
        }

        .chat-input-container {
            display: flex;
            gap: 8px;
        }

        .chat-input-container input {
            flex: 1;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            margin-right: 5px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 13px;
            border-left: 3px solid #c62828;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 13px;
            border-left: 3px solid #2e7d32;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .small-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }
        }

        /* Scrollbar styling */
        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }

        .messages-area::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>🏫 Školní interní portál</h1>
            <p><span class="status-indicator"></span> Online | Automatická aktualizace chatu</p>
        </header>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- CHAT PANEL -->
            <div class="chat-panel">
                <div class="panel-header">💬 Veřejný chat</div>
                <div class="panel-content">
                    <div class="input-group" style="margin-bottom: 10px;">
                        <input type="text" id="userName" placeholder="Tvoje jméno..." maxlength="50" value="Uživatel">
                    </div>

                    <div class="messages-area" id="messagesArea"></div>

                    <div class="chat-input-container">
                        <input type="text" id="chatMessage" placeholder="Napiš zprávu..." maxlength="500">
                        <button onclick="sendChatMessage()">Odeslat</button>
                    </div>
                    <p class="small-text">📝 Zprávy se ukládají jen v paměti (obnoví se po restartu)</p>
                </div>
            </div>

            <!-- AI PANEL -->
            <div class="ai-panel">
                <div class="panel-header">🤖 AI asistent</div>
                <div class="panel-content">
                    <div style="margin-bottom: 10px;">
                        <label style="font-weight: bold; font-size: 12px; display: block; margin-bottom: 5px;">📄 Vyber dokument (volitelné):</label>
                        <select id="documentSelect">
                            <option value="">-- Bez dokumentu --</option>
                        </select>
                    </div>

                    <div id="aiMessages" class="messages-area" style="margin-bottom: 10px;"></div>

                    <textarea id="aiPrompt" placeholder="Postav otázku AI..."></textarea>

                    <div style="display: flex; gap: 8px; margin-top: 10px;">
                        <button onclick="sendAIPrompt(this)" style="flex: 1;">Poslat</button>
                        <button onclick="clearAIMessages()" style="flex: 0.3; background: #999;">Smazat</button>
                    </div>

                    <p class="small-text">💡 AI pracuje s textovými dokumenty z docs/ složky</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CHAT_POLL_INTERVAL = 2000; // 2 seconds
        const AUTO_SCROLL = true;

        // State
        let aiMessages = [];
        let userName = localStorage.getItem('userName') || 'Uživatel';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🚀 Aplikace spuštěna');
            
            // Načti uložené jméno
            const savedUserName = localStorage.getItem('userName');
            if (savedUserName) {
                document.getElementById('userName').value = savedUserName;
            }

            // Načti seznam dokumentů
            loadDocuments();

            // Polling chatu
            loadChatMessages();
            setInterval(loadChatMessages, CHAT_POLL_INTERVAL);

            // Event listeners
            document.getElementById('chatMessage').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendChatMessage();
            });

            document.getElementById('aiPrompt').addEventListener('keypress', (e) => {
                if (e.ctrlKey && e.key === 'Enter') sendAIPrompt();
            });

            document.getElementById('userName').addEventListener('change', (e) => {
                userName = e.target.value.trim() || 'Uživatel';
                localStorage.setItem('userName', userName);
            });
        });

        // Load documents list
        async function loadDocuments() {
            try {
                const response = await fetch('/docs');
                const data = await response.json();
                const select = document.getElementById('documentSelect');
                
                // Smaž staré options
                select.innerHTML = '<option value="">-- Bez dokumentu --</option>';
                
                // Přidej nové
                data.documents.forEach(doc => {
                    const option = document.createElement('option');
                    option.value = doc;
                    option.textContent = doc;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Chyba při načítání dokumentů:', error);
            }
        }

        // Load chat messages
        async function loadChatMessages() {
            try {
                const response = await fetch('/chat');
                const data = await response.json();
                
                const area = document.getElementById('messagesArea');
                area.innerHTML = '';
                
                data.messages.forEach(msg => {
                    const msgEl = document.createElement('div');
                    msgEl.className = 'message';
                    msgEl.innerHTML = `
                        <div class="message-user">${escapeHtml(msg.user)}</div>
                        <div class="message-text">${escapeHtml(msg.message)}</div>
                        <div class="message-time">${new Date(msg.time).toLocaleTimeString('cs-CZ')}</div>
                    `;
                    area.appendChild(msgEl);
                });

                // Auto-scroll
                if (AUTO_SCROLL) {
                    area.scrollTop = area.scrollHeight;
                }
            } catch (error) {
                console.error('Chyba při načítání chatu:', error);
            }
        }

        // Send chat message
        async function sendChatMessage() {
            const input = document.getElementById('chatMessage');
            const message = input.value.trim();
            
            if (!message) return;

            const user = document.getElementById('userName').value.trim() || 'Uživatel';

            try {
                const response = await fetch('/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, message })
                });

                if (response.ok) {
                    input.value = '';
                    await loadChatMessages();
                } else {
                    showError('chat', 'Chyba při odesílání zprávy');
                }
            } catch (error) {
                showError('chat', 'Chyba: ' + error.message);
            }
        }

        // Send AI prompt
        async function sendAIPrompt(btn) {
            const prompt = document.getElementById('aiPrompt').value.trim();
            const docName = document.getElementById('documentSelect').value;
            const button = btn || document.querySelector('button[onclick^="sendAIPrompt"]');

            if (!prompt) {
                showError('ai', 'Napiš otázku pro AI');
                return;
            }

            if (button) {
                button.disabled = true;
                button.innerHTML = '<span class="loading"></span> Čekám...';
            }

            try {
                const response = await fetch('/ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, document: docName })
                });

                const data = await response.json();

                if (response.ok) {
                    // Přidej do AI messages
                    aiMessages.push({
                        role: 'user',
                        content: prompt,
                        document: docName,
                        time: new Date().toISOString()
                    });
                    aiMessages.push({
                        role: 'ai',
                        content: data.response,
                        time: new Date().toISOString()
                    });

                    document.getElementById('aiPrompt').value = '';
                    renderAIMessages();
                } else {
                    showError('ai', data.error || 'Chyba API');
                }
            } catch (error) {
                showError('ai', 'Chyba: ' + error.message);
            } finally {
                if (button) {
                    button.disabled = false;
                    button.innerHTML = 'Poslat';
                }
            }
        }

        // Render AI messages
        function renderAIMessages() {
            const area = document.getElementById('aiMessages');
            area.innerHTML = '';

            aiMessages.forEach((msg, idx) => {
                const msgEl = document.createElement('div');
                msgEl.className = 'message ' + (msg.role === 'ai' ? 'ai-response' : '');
                
                let html = `<div class="message-text">${escapeHtml(msg.content)}</div>`;
                
                if (msg.role === 'user' && msg.document) {
                    html += `<div class="small-text">📄 Dokument: ${escapeHtml(msg.document)}</div>`;
                }
                
                html += `<div class="message-time">${new Date(msg.time).toLocaleTimeString('cs-CZ')}</div>`;
                
                msgEl.innerHTML = html;
                area.appendChild(msgEl);
            });

            if (AUTO_SCROLL) {
                area.scrollTop = area.scrollHeight;
            }
        }

        // Clear AI messages
        function clearAIMessages() {
            if (confirm('Smazat všechny AI odpovědi?')) {
                aiMessages = [];
                document.getElementById('aiMessages').innerHTML = '';
            }
        }

        // Show error
        function showError(panel, message) {
            const area = panel === 'chat' 
                ? document.getElementById('messagesArea')
                : document.getElementById('aiMessages');
            
            const errorEl = document.createElement('div');
            errorEl.className = 'error';
            errorEl.textContent = '⚠️ ' + message;
            area.insertBefore(errorEl, area.firstChild);

            setTimeout(() => errorEl.remove(), 5000);
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
