version: '3.8'

# ⚠️ UPOZORNĚNÍ: docker-compose je OPTIONAL
# Primárně se aplikace spouští Dockerfile (single container)
# Tento soubor je POUZE PRO VÝVOJ/TESTOVÁNÍ s lokálním AI serverem
# 
# Produkční nasazení: docker run ... (viz DEPLOYMENT.md)

services:
  app:
    build: .
    container_name: kushaeos
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      OPENAI_BASE_URL: http://ollama:11434
      OPENAI_API_KEY: dummy-key-for-dev
      OPENAI_MODEL: gemma3:27b
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/ping"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # ⚠️ OPTIONAL: Místní Ollama server pro vývoj
  # Pokud nemáš Ollama, zakomentuj tuto sekci
  # Instalace Ollama: https://ollama.ai
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # Downloader model: docker exec ollama ollama pull gemma3:27b

volumes:
  ollama-data:

# Spuštění:
# docker-compose up
#
# S rebuild:
# docker-compose up --build
#
# Na pozadí:
# docker-compose up -d
#
# Zastavení:
# docker-compose down
#
# Logy:
# docker-compose logs -f app
#
# Jen aplikace (bez Ollamy):
# services:
#   app:  [vše zůstane}
#   (smaž ollama sekci a depends_on)
