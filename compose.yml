services:
  app:
    build: .
    ports:
      - "8081"
    environment:
      - PORT=8081
      - OPENAI_BASE_URL=https://kurim.ithope.eu/v1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gemma3:27b
      - CHROMA_HOST=vectordb
      - CHROMA_PORT=8000
    depends_on:
      - vectordb

  vectordb:
    image: chromadb/chroma